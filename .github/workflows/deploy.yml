name: Deploy to Firebase Hosting on merge
on:
  push:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Reads .nvmrc (Node 24) so deploy matches package.json engines.
          # NOTE: Node 22.23.0 shipped an http.Agent "response queue poisoning"
          # fix that caused a false-positive ERR_STREAM_PREMATURE_CLOSE on
          # keep-alive sockets, breaking firebase-tools' OAuth token exchange
          # (gaxios -> node-fetch) and misreporting it as "Failed to
          # authenticate" (nodejs/node#63989, firebase-tools#10692). Node 24
          # carries the same http.Agent fix, so if a deploy fails auth, pin
          # back to a known-good version here.
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_STONETOP_D76FB }}"
          channelId: live
          projectId: stonetop-d76fb
